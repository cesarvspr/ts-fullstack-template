services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  be:
    build:
      context: .
      dockerfile: be/Dockerfile
    restart: unless-stopped
    ports:
      - '${PORT}:${PORT}'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
    volumes:
      - ./be/src:/app/be/src
      - ./be/prisma:/app/be/prisma
      - be_node_modules:/app/be/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app/be && npx prisma generate && npx prisma migrate deploy && npx tsx watch src/index.ts"

  fe:
    build:
      context: .
      dockerfile: fe/Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL}
    volumes:
      - ./fe/src:/app/fe/src
      - ./fe/public:/app/fe/public
      - fe_node_modules:/app/fe/node_modules
    depends_on:
      - be

volumes:
  pg_data:
  be_node_modules:
  fe_node_modules:
